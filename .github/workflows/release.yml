name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-proto-stubs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install C compiler
        run: sudo apt-get install -y gcc

      - name: Generate Kotlin stubs
        run: buf generate --template buf.gen.kotlin.yaml

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: gradle publish -p gradle

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: publish-proto-stubs
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/snootbeestci/codewalker:${{ github.ref_name }}
            ghcr.io/snootbeestci/codewalker:latest
