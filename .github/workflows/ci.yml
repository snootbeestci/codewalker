name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install C compiler (required for tree-sitter CGO)
        run: sudo apt-get install -y gcc

      - name: Download dependencies
        run: go mod download

      - name: Lint proto
        run: buf lint

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./...
