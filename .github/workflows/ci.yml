name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install C compiler (required for tree-sitter CGO)
        run: sudo apt-get install -y gcc

      - name: Download dependencies
        run: go mod download

      - name: Lint proto
        run: buf lint

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./...

  gradle-publish-dry-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate Kotlin stubs
        run: buf generate --template buf.gen.kotlin.yaml

      - name: Gradle publish dry run
        env:
          RELEASE_VERSION: dry-run
          GITHUB_ACTOR: dry-run
          GITHUB_TOKEN: dry-run
        run: ./gradle/gradlew -p gradle publishToMavenLocal
