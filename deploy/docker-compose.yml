services:
  codewalker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "50051:50051"
    volumes:
      - ${REPO_PATH:-/tmp}:/repos/target:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODEWALKER_REPO_ROOT=/repos/target
      - CODEWALKER_PORT=50051
      - CODEWALKER_LOG_LEVEL=${CODEWALKER_LOG_LEVEL:-info}
      - CODEWALKER_LLM_PROVIDER=${CODEWALKER_LLM_PROVIDER:-anthropic}
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
